name: Build and Release OOXML Validator Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.dotnet_rid }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet_rid: win-x64
            runner: ubuntu-latest
          - dotnet_rid: win-arm64
            runner: ubuntu-latest
          - dotnet_rid: linux-x64
            runner: ubuntu-latest
          - dotnet_rid: linux-arm64
            runner: ubuntu-latest
          - dotnet_rid: osx-x64
            runner: macos-latest
          - dotnet_rid: osx-arm64
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ooxml-validator-dotnet/ooxml-validator.csproj

      - name: Publish self-contained single file
        run: |
          dotnet publish ooxml-validator-dotnet/ooxml-validator.csproj \
            -c Release \
            -r ${{ matrix.dotnet_rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o out/${{ matrix.dotnet_rid }}

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.dotnet_rid }}" == win-* ]]; then
            BIN_NAME="ooxml-validator.exe"
            OUT_NAME="ooxml-validator-${{ matrix.dotnet_rid }}.exe"
          else
            BIN_NAME="ooxml-validator"
            OUT_NAME="ooxml-validator-${{ matrix.dotnet_rid }}"
          fi
          mv "out/${{ matrix.dotnet_rid }}/${BIN_NAME}" "artifacts/${OUT_NAME}"
          chmod +x "artifacts/${OUT_NAME}" || true

      - name: Ad-hoc codesign (macOS only)
        if: startsWith(matrix.dotnet_rid, 'osx-')
        run: |
          OUT_NAME="ooxml-validator-${{ matrix.dotnet_rid }}"
          codesign --force --sign - --timestamp=none "artifacts/${OUT_NAME}"
          codesign --verify --verbose "artifacts/${OUT_NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ooxml-validator-${{ matrix.dotnet_rid }}
          path: artifacts/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: collected

      - name: Display collected files
        run: ls -R collected

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: collected/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Determine version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify all 13 versions are in sync
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"

          # 1. Root package.json .version must match the tag.
          root=$(jq -r .version package.json)
          if [ "$root" != "$V" ]; then
            echo "Tag v$V does not match package.json version $root"
            exit 1
          fi

          # 2 & 3. All 6 optionalDependencies pins and 6 sub-package versions must match.
          for rid in darwin-arm64 darwin-x64 linux-arm64 linux-x64 win32-arm64 win32-x64; do
            pinned=$(jq -r ".optionalDependencies.\"@xarsh/ooxml-validator-$rid\"" package.json)
            if [ "$pinned" != "$V" ]; then
              echo "package.json pins @xarsh/ooxml-validator-$rid to $pinned, expected $V"
              exit 1
            fi
            sub=$(jq -r .version "npm/$rid/package.json")
            if [ "$sub" != "$V" ]; then
              echo "npm/$rid/package.json version is $sub, expected $V"
              exit 1
            fi
          done

          echo "All 13 versions match $V"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: collected

      - name: Install dependencies
        run: npm install --ignore-scripts --omit=optional --no-package-lock --no-audit --no-fund

      - name: Build parent package
        run: npm run build

      - name: Publish platform packages
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"

          publish_platform() {
            local dotnet_rid="$1"
            local npm_rid="$2"
            local ext=""
            if [[ "$dotnet_rid" == win-* ]]; then ext=".exe"; fi
            local bin_name="ooxml-validator${ext}"
            local src="collected/ooxml-validator-${dotnet_rid}/ooxml-validator-${dotnet_rid}${ext}"
            local pkg_dir="npm/${npm_rid}"

            cp "$src" "${pkg_dir}/${bin_name}"
            chmod +x "${pkg_dir}/${bin_name}" || true

            (
              cd "$pkg_dir"
              npm version --no-git-tag-version --allow-same-version "$VERSION"
              npm publish --provenance --access public
            )
          }

          publish_platform osx-arm64    darwin-arm64
          publish_platform osx-x64      darwin-x64
          publish_platform linux-arm64  linux-arm64
          publish_platform linux-x64    linux-x64
          publish_platform win-arm64    win32-arm64
          publish_platform win-x64      win32-x64

      - name: Publish parent package
        run: npm publish --provenance --access public
